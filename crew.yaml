# === GitHub ===
github:
  repo: "Fo-gi/ProjectBlue"
  auto_create_labels: true

# === Tags & Prioritäten ===
# Priority: niedriger = früher abgearbeitet.
# handler: Welcher Agent bearbeitet das Issue?
tags:
  - name: agent-epic
    priority: 1
    handler: epic_planner
    color: "BFD4F2"
  - name: agent-ready
    priority: 2
    handler: coder
    color: "0E8A16"
  - name: agent-working
    priority: 0
    color: "FEF2C0"
  - name: agent-done
    priority: 0
    color: "5319E7"
  - name: agent-escalation-1
    priority: 3
    handler: coder
    color: "D93F0B"
  - name: agent-escalation-2
    priority: 4
    handler: coder_deep
    color: "B60205"
  - name: agent-stuck
    priority: 0
    color: "000000"

# === Provider ===
# Unterstützt: ollama, anthropic, openai, gemini
providers:
  ollama_ts:
    type: ollama
    base_url: "http://100.111.112.15:11434"
  anthropic:
    type: anthropic
    api_key_env: ANTHROPIC_API_KEY

# === Modelle ===
# Alias -> Provider + Modellname (wie LiteLLM es erwartet)
models:
  planner-local:
    provider: ollama_ts
    model: ollama_chat/gemma4:26b
    temperature: 0.1
    max_tokens: 2000
  reviewer-local:
    provider: ollama_ts
    model: ollama_chat/gemma4:26b
    temperature: 0.1
    max_tokens: 2000
  tester-local:
    provider: ollama_ts
    model: ollama_chat/qwen2.5:7b
    temperature: 0.1
    max_tokens: 6000
  qwen-local:
    provider: ollama_ts
    model: ollama_chat/qwen2.5-coder:7b
    temperature: 0.1
    max_tokens: 1500
  coder-local:
    provider: ollama_ts
    model: ollama_chat/qwen2.5-coder:14b
    temperature: 0.1
    max_tokens: 4000
  sonnet:
    provider: anthropic
    model: anthropic/claude-sonnet-4-6
    temperature: 0.1
    max_tokens: 4000

# === Agenten ===
# type: litellm = via LiteLLM-Proxy; claude_cli = via `claude -p`
agents:
  planner:
    model: planner-local
    description: "Use PROACTIVELY at task kickoff to read SPEC.md, survey the codebase, and produce a precise step-by-step implementation plan. Use again only when stuck for >3 iterations."
    tools: [Read, Grep, Glob, Bash]
    type: litellm
    prompt: |
      You are a senior staff engineer. You do not write code. You produce a plan.

      Before planning, call the local planning model via LiteLLM for deep analysis:

      ```bash
      curl -fsS http://localhost:4000/v1/chat/completions \
        -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
        -H "Content-Type: application/json" \
        -d "{\"model\":\"planner-local\",\"messages\":[{\"role\":\"user\",\"content\":\"$(cat SPEC.md | head -200 | jq -Rs .)\"}],\"max_tokens\":2000}" \
        | jq -r '.choices[0].message.content'
      ```

      Then read the codebase and synthesize into a plan:

      1. Read SPEC.md fully.
      2. Use Grep/Glob to find existing patterns. Cite file:line.
      3. Output numbered plan: Step N: [verb] [path] -- intent. Files to create/modify. Tests. Risks.
      4. Stop. Do not implement. Keep under 400 lines.

  tester:
    model: tester-local
    description: "Use after every code change to run tests + lint and return a structured summary."
    tools: [Bash, Read]
    type: litellm
    prompt: |
      Run tests and lint locally — no cloud model needed for execution:

      1. `pytest -q --tb=short 2>&1 | tail -80`  (only if pyproject.toml or tests/ exists)
      2. `ruff check . 2>&1 | tail -40`           (only if ruff.toml or pyproject.toml exists)
      3. `npm test --silent 2>&1 | tail -40`      (only if package.json exists)

      If you need to interpret ambiguous failures, call the local tester model:

      ```bash
      curl -fsS http://localhost:4000/v1/chat/completions \
        -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
        -H "Content-Type: application/json" \
        -d "{\"model\":\"tester-local\",\"messages\":[{\"role\":\"user\",\"content\":\"Explain this test failure and suggest a fix: <PASTE_ERROR_HERE>\"}],\"max_tokens\":500}" \
        | jq -r '.choices[0].message.content'
      ```

      Return JSON only:
      { "tests_pass": bool, "lint_clean": bool, "failures": [...], "summary": "..." }

  reviewer:
    model: reviewer-local
    description: "Use before opening a PR to review the diff against SPEC and conventions."
    tools: [Bash, Read, Grep, Glob]
    type: litellm
    prompt: |
      1. Run `git diff origin/main...HEAD` and capture output.
      2. Read SPEC.md.
      3. Send diff to local reviewer model for analysis:

      ```bash
      DIFF=$(git diff origin/main...HEAD | head -300)
      SPEC=$(cat SPEC.md 2>/dev/null | head -100)
      curl -fsS http://localhost:4000/v1/chat/completions \
        -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
        -H "Content-Type: application/json" \
        -d "{\"model\":\"reviewer-local\",\"messages\":[{\"role\":\"user\",\"content\":\"Review this diff against the spec. Spec:\n${SPEC}\n\nDiff:\n${DIFF}\n\nReturn JSON: {approve: bool, blocking: [], nits: [], missing_criteria: []}\"}],\"max_tokens\":1000}" \
        | jq -r '.choices[0].message.content'
      ```

      Output JSON only:
      { "approve": bool, "blocking": [...], "nits": [...], "missing_criteria": [...] }

  epic_planner:
    model: tester-local
    description: "Breaks down epic issues into sequential agent-ready issues."
    tools: [Bash]
    type: litellm
    prompt: |
      Break down this project vision into 5-8 GitHub issues to implement sequentially.
      Rules: foundation first, each issue self-contained with acceptance criteria,
      include full vision as context in each body.

      Return ONLY a JSON array. Each element: {"title": string, "body": markdown string}.
      No explanation, no code fences.

  coder:
    model: sonnet
    description: "Main coding agent via claude -p"
    type: claude_cli
    prompt: |
      Read SPEC.md and implement it.

      Workflow:
      1. Use the 'planner' subagent first to make a step-by-step plan.
      2. Implement the plan, creating commits as you go (git config user.email/name is set).
      3. After each significant change, use the 'tester' subagent to verify.
      4. Before finishing, use the 'reviewer' subagent. If it returns approve=false,
         address all 'blocking' items.
      5. End when: all tests pass, lint clean, diff vs origin/main is non-empty.

      Local models available at http://localhost:4000 (auth: Bearer $LITELLM_MASTER_KEY).
      Models: planner-local, tester-local, reviewer-local, coder-local.

      The Stop-Hook will tell you to keep going if you stop too early.
      Hard cap: 25 iterations, $10.

  coder_deep:
    model: sonnet
    description: "Deep review after 2 failures"
    type: claude_cli
    prompt: |
      Read SPEC.md and implement it carefully.

      KRITISCH (Versuch 3/3, letzter automatischer Versuch):
      Zwei vorherige Versuche sind fehlgeschlagen. Lies ESCALATION.md sorgfältig.
      Gehe systematisch vor: prüfe jeden Schritt explizit, mache keine Annahmen.
      Lasse Tests immer direkt nach jeder Änderung laufen.

      Hard cap: 25 iterations, $10.

# === Limits ===
limits:
  max_iterations: 25
  task_budget_usd: 10
  daily_budget_usd: 20
  max_parallel: 1
  timeout_minutes: 240

# === LiteLLM ===
litellm:
  port: 4000
  host: "127.0.0.1"
  master_key_env: LITELLM_MASTER_KEY
  router:
    num_retries: 2
    timeout: 180
    fallbacks:
      planner-local: [qwen-local]
      reviewer-local: [qwen-local]
      coder-local: [qwen-local]
  budget:
    max_budget: 20
    budget_duration: 1d
